<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的静态博客空间</title>
    
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <style>
        /* 1. 基础设置：背景设为透明，让视频透出来 */
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: transparent; /* 背景透明 */
        }
        * { box-sizing: border-box; }

        /* 2. 视频背景样式 (全屏铺满完美版) */
        .video-background {
            position: fixed; 
            top: 0;          /* 从屏幕最左上角开始贴合 */
            left: 0;
            width: 100vw;    /* 强制宽度等于屏幕总宽度 */
            height: 100vh;   /* 强制高度等于屏幕总高度 */
            z-index: -100; 
            object-fit: cover; /* 核心魔法：保持视频原本比例，像壁纸一样裁剪铺满 */
        }        

       
/* 3. 顶部导航栏 (完全透明) */
        .top-nav { 
            position: sticky; top: 0; 
            background-color: transparent;  /* 彻底透明 */
            backdrop-filter: none;          /* 取消毛玻璃模糊 */
            -webkit-backdrop-filter: none;
            box-shadow: none;               /* 取消底部的阴影分割线 */
            
            color: white; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 60px; z-index: 1000; 
        }
        
        /* 导航栏Logo文字 */
        .nav-logo { 
            font-size: 1.2em; 
            font-weight: 800; 
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); /* 加上黑色的文字发光，防止看不清 */
        }
        
        /* 导航栏按钮链接 */
        .nav-links a { 
            color: #fff; text-decoration: none; font-size: 0.95em; 
            padding: 5px 12px; border-radius: 4px; transition: background 0.3s; margin-left: 5px; 
            background-color: transparent; /* 取消按钮原本带的半透明底色 */
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); /* 加上黑色阴影 */
        }
        
        /* 鼠标悬停在按钮上的效果：出现微弱的白光背景 */
        .nav-links a:hover { 
            background-color: rgba(255, 255, 255, 0.2); 
            color: #fff; 
        }        .nav-logo { font-size: 1.2em; font-weight: bold; }
        .nav-links a { color: #ecf0f1; text-decoration: none; font-size: 0.95em; padding: 5px 12px; border-radius: 4px; transition: background 0.3s; margin-left: 5px; background-color: rgba(255, 255, 255, 0.1); }
        .nav-links a:hover { background-color: #34495e; color: #34dbcb; }

        /* 4. 布局容器 */
        .layout-container { display: flex; max-width: 1200px; margin: 25px auto; gap: 20px; padding: 0 20px; align-items: flex-start; }

     /* --- 5. 左侧栏布局与独立卡片 --- */
        
        /* 这个只负责占据 20% 的宽度并固定在屏幕左侧，没有任何背景和边框 */
        .sidebar-wrapper { 
            width: 17%; 
            position: sticky; top: 80px; 
        }

        /* 侧边栏里每一张独立卡片的通用样式 */
        .side-card {
            background: transparent;       
            backdrop-filter: none;         
            -webkit-backdrop-filter: none;
            box-shadow: none;              
            border: 1px solid rgba(0, 0, 0, 0.2); 
            color: #111;                   
            
            padding: 20px 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; /* 两张卡片之间留出 20px 的空隙 */
            transition: all 0.3s ease; 
        }

        /* 独立卡片的悬停浮起效果 */
        .side-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        /* 侧边栏标题的泛光样式 */
        .side-card h3 { 
            margin-top: 0; font-size: 1.1em; color: #000; margin-bottom: 15px; 
            padding-left: 8px; border-left: 3px solid #3498db; 
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
        }

        /* 个人名片内部样式 (去掉了以前的虚线分割，因为已经是独立卡片了) */
        .profile-card {
            text-align: center;
        }
        
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(52, 152, 219, 0.3); padding: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px;
            transition: transform 0.3s ease;
        }
        .profile-avatar:hover { transform: scale(1.08) rotate(5deg); }

        .profile-name { font-size: 1.25em; color: #000; margin: 0 0 8px 0; font-weight: 800; text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8); }
        .profile-bio { font-size: 0.85em; color: #333; line-height: 1.6; margin: 0; font-weight: 500; text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6); padding: 0 5px; }
             /* --------------------------- */

        /* 6. 标签云 (透明化处理) */
        .category-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .category-list li { 
            padding: 4px 10px; 
            background-color: transparent; /* 标签背景透明 */
            color: #3498db; 
            border: 1px solid rgba(52, 152, 219, 0.6); /* 保留稍明显的蓝色边框 */
            border-radius: 4px; font-size: 0.85em; font-weight: 600; 
            cursor: pointer; transition: all 0.2s ease;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8); /* 增加文字发光 */
        }
        .category-list li:hover, .category-list li.active { 
            background-color: #3498db; color: white; text-shadow: none; 
        }

        /* 7. 右侧主内容区 */
        .main-content { width: 80%; }
        
      /* 8. 通用文章卡片样式 */
        .post-card { 
            background: transparent; 
            backdrop-filter: none; 
            -webkit-backdrop-filter: none;
            box-shadow: none;
            
            /* --- 主要是这里修改了边框 --- */
            border: 1px solid rgba(0, 0, 0, 0.2);  /* 基础的透明灰边框 ，最后一个为透明度*/
            border-left: 2px solid #00a8ff;      /* 本次新增：右侧亮蓝色加粗提示条 */
            /* ------------------------ */
            
            color: #111; 
            padding: 25px; border-radius: 8px; margin-bottom: 20px; 
            transition: all 0.3s ease; 
        }
        
        /* 鼠标悬停时的效果 */
        .post-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15); 
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15); 
            
            /* 悬停时边框加深，同时让右侧的亮蓝色条加上发光效果 */
            border: 1px solid rgba(0, 0, 0, 0);
            border-left: 5px solid #00a8ff; 
            box-shadow: 4px 12px 24px rgba(0, 168, 255, 0.2); /* 给卡片右侧增加一点蓝色的环境光 */
        }        
        /* 文章标题和正文：加深字体并加上细微白底阴影保护可读性 */
        .post-title { font-size: 1.6em; margin: 0 0 10px 0; color: #000; font-weight: 600; cursor: pointer; transition: color 0.2s; text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8); }
        .post-title:hover { color: #3498db; }
        .post-meta { color: #444; font-size: 0.85em; margin-bottom: 15px; font-weight: 500;  }
        .post-tag { background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; color: #3498db; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 10px; }
        .post-excerpt { line-height: 1.7; color: #000; margin-bottom: 15px; font-weight: 500;  }
        .read-more { color: #3498db; text-decoration: none; font-weight: bold; cursor: pointer; }

        .btn-back { background: #34495e; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; margin-bottom: 20px; }
        .post-detail-content { line-height: 1.8; color: #222; font-size: 1.05em; white-space: pre-wrap; font-weight: 500; text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-background">
        <source src="blog-background.mp4" type="video/mp4">
    </video>

    <nav class="top-nav">
        <div class="nav-logo">My Blog</div>
        <div class="nav-links">
            <a href="#" onclick="switchPage('home')">首页</a>
            <a href="#" onclick="switchPage('archive')">归档</a>
            <a href="#" onclick="switchPage('stats')">统计</a>
            <a href="#" onclick="switchPage('about')">关于</a>
        </div>
    </nav>

    <div class="layout-container">
        <aside class="sidebar-wrapper" id="sidebarArea">
            
            <div class="side-card profile-card">
                <img src="avatar.jpg" alt="我的头像" class="profile-avatar">
                <h2 class="profile-name">Potervlag</h2>
                <p class="profile-bio">热爱代码与生活。这里是我的数字花园，记录成长的点滴。</p>
            </div>

            <div class="side-card nav-card">
                <h3>分类导航</h3>
                <ul class="category-list" id="categoryMenu">
                    <li class="active" data-cat="全部内容">全部</li>
                    <li data-cat="读书分享会">读书</li>
                    <li data-cat="游戏专栏">游戏</li>
                    <li data-cat="日常分享">日常</li>
                    <li data-cat="技术小白学习">技术</li>
                </ul>
            </div>
            
        </aside>
       
        <main class="main-content">
            
            <div id="listView"></div>
            
            <div id="detailView" style="display: none;">
                <button class="btn-back" onclick="switchPage('home')">← 返回列表</button>
                <div class="post-card">
                    <h1 id="detailTitle" class="post-title" style="margin-top:0;"></h1>
                    <div class="post-meta"><span id="detailTag" class="post-tag"></span><span id="detailDate"></span></div>
                    <hr style="border: 0; border-top: 1px dashed rgba(0,0,0,0.2); margin: 20px 0;">
                    <div id="detailContent" class="post-detail-content"></div>
                </div>
            </div>
            
            <div id="archiveView" class="post-card" style="display: none;">
                <h2 class="post-title">📜 文章归档</h2>
                <hr style="border: 0; border-top: 1px dashed rgba(0,0,0,0.2); margin: 15px 0;">
                <div id="archiveList" style="line-height: 2; font-weight: 500; text-shadow: 1px 1px 3px rgba(255,255,255,0.8);"></div>
            </div>
            
            <div id="statsView" class="post-card" style="display: none;">
                <h2 class="post-title">📊 博客统计</h2>
                <hr style="border: 0; border-top: 1px dashed rgba(0,0,0,0.2); margin: 15px 0;">
                <div style="font-size: 1.1em; line-height: 2; font-weight: 500; text-shadow: 1px 1px 3px rgba(255,255,255,0.8);">
                    <p>📝 文章总数：<strong id="statTotal" style="color: #3498db;">0</strong> 篇</p>
                    <p>👁️ 网站总浏览量：<strong style="color: #e74c3c;"><span id="busuanzi_value_site_pv">--</span></strong> 次</p>
                    <p>👥 网站总访客数：<strong style="color: #e74c3c;"><span id="busuanzi_value_site_uv">--</span></strong> 人</p>
                </div>
            </div>
            
            <div id="aboutView" class="post-card" style="display: none;">
                <h2 class="post-title">👤 关于我</h2>
                <hr style="border: 0; border-top: 1px dashed rgba(0,0,0,0.2); margin: 15px 0;">
                <p class="post-excerpt">欢迎来到我的个人博客。这里是我用代码亲手搭建的精神角落。</p>
            </div>
            
        </main>
    </div>

    <script src="data.js"></script>

    <script>
        let currentCategory = '全部内容';

        // 渲染首页列表
        function renderList() {
            const container = document.getElementById('listView');
            container.innerHTML = '';
            const filtered = currentCategory === '全部内容' ? blogPosts : blogPosts.filter(p => p.category === currentCategory);
            
            filtered.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <h2 class="post-title" onclick="showDetail(${post.id})">${post.title}</h2>
                    <div class="post-meta"><span class="post-tag">${post.category}</span>发布于：${post.date}</div>
                    <div class="post-excerpt">${post.content.length > 80 ? post.content.substring(0, 80) + '...' : post.content}</div>
                    <a class="read-more" onclick="showDetail(${post.id})">阅读全文 →</a>
                `;
                container.appendChild(card);
            });
        }

        // 顶部导航页面切换
        function switchPage(pageId) {
            const views = ['listView', 'detailView', 'archiveView', 'statsView', 'aboutView'];
            views.forEach(v => document.getElementById(v).style.display = 'none');
            
            if(document.getElementById(pageId + 'View')) {
                document.getElementById(pageId + 'View').style.display = 'block';
            } else {
                document.getElementById('listView').style.display = 'block';
            }
            
            if(pageId === 'home') renderList();
            if(pageId === 'stats') document.getElementById('statTotal').innerText = blogPosts.length;
            if(pageId === 'archive') {
                const list = document.getElementById('archiveList');
                list.innerHTML = blogPosts.map(p => `<div><span style="color: #666; margin-right: 15px;">${p.date}</span> <a href="#" onclick="showDetail(${p.id})" style="color: #111; text-decoration: none; border-bottom: 1px dashed #ccc;">${p.title}</a></div>`).join('');
            }
        }

        // 显示文章详情
        function showDetail(id) {
            const post = blogPosts.find(p => p.id === id);
            if (!post) return;
            switchPage('detail');
            document.getElementById('detailTitle').innerText = post.title;
            document.getElementById('detailContent').innerText = post.content;
            document.getElementById('detailTag').innerText = post.category;
            document.getElementById('detailDate').innerText = '发布于：' + post.date;
        }

        // 左侧标签点击筛选
        document.getElementById('categoryMenu').addEventListener('click', (e) => {
            if (e.target.tagName === 'LI') {
                document.querySelectorAll('.category-list li').forEach(li => li.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-cat');
                switchPage('home'); // 切回首页并渲染过滤后的列表
            }
        });

        // 初始化加载
        window.onload = () => renderList();
    </script>
</body>
</html>
